# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Lint | Test | Build

on:
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - 
      name: Checkout code
      uses: actions/checkout@v4
    - 
      name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    
    - 
      name: golangci-lint
      uses: golangci/golangci-lint-action@v9.2.0
      with:
        version: v2.11.4

  test:
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
    - 
      name: Checkout code
      uses: actions/checkout@v4
    - 
      name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - 
      name: Run test suite | nex
      run: |
        go test -v -race -count 3 ./...
    - 
      name: Run test suite | CLI
      working-directory: ./cmd/nex
      run: |
        go test -v -race -count 3 ./...

  build:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    -
      name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    -
      name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    -
      name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: latest
        args: build --clean --snapshot
